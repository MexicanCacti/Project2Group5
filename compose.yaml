services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tell-tales-client
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - .env
      - ./client/.env
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tell-tales-server
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - .env
      - ./server/.env
